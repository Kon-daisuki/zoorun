<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恶搞跑酷 - 尺寸放大版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center bottom;
            font-family: 'Arial', sans-serif; 
            touch-action: none; 
        }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .panel { pointer-events: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                 background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; text-align: center; 
                 box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 300px; display: none; }
        
        h1 { margin-top: 0; color: #333; }
        button { background: #ff4757; color: white; border: none; padding: 15px 40px; border-radius: 30px; 
                 font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.9); }
        
        #score-display { position: absolute; top: 20px; left: 20px; font-size: 24px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        #start-panel { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="score-display">得分: 0</div>
        
        <div id="start-panel" class="panel">
            <h1>准备好了吗？</h1>
            <p>左右滑动或点击两侧移动</p>
            <button onclick="startGame()">开始游戏</button>
        </div>

        <div id="game-over" class="panel">
            <h1>被抓住了！</h1>
            <p>最终得分: <span id="final-score">0</span></p>
            <button onclick="location.reload()">重新挑战</button>
        </div>
    </div>

    <script>
        function startGame() {
            document.getElementById('start-panel').style.display = 'none';

            const audioBgm = new Audio('bgm.mp3');
            audioBgm.loop = true;
            audioBgm.play();
            const audioEnd = new Audio('end.mp3');

            // --- 1. 基础场景 ---
            const scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 10, 35);

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            camera.position.set(0, 3.5, 6); // 稍微调高一点摄像机，适应更大的模型
            camera.lookAt(0, 1, -5);

            // --- 2. 跑道地面 ---
            const textureLoader = new THREE.TextureLoader();
            const groundTexture = textureLoader.load('ground.jpg');
            groundTexture.wrapS = THREE.RepeatWrapping;
            groundTexture.wrapT = THREE.RepeatWrapping;
            groundTexture.repeat.set(1, 10);

            const groundGeo = new THREE.PlaneGeometry(12, 100);
            const groundMat = new THREE.MeshBasicMaterial({ map: groundTexture });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.z = -40;
            scene.add(ground);

            // --- 3. 玩家设置 ---
            const playerTexture = textureLoader.load('player.png');
            const playerMat = new THREE.MeshBasicMaterial({ map: playerTexture, transparent: true, side: THREE.DoubleSide });
            
            // 【调整：适当放大尺寸】宽度1.6，高度2.2
            const playerGeo = new THREE.PlaneGeometry(1.6, 2.2); 
            playerGeo.translate(0, 1.1, 0); 
            const player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, 0, 0); 
            scene.add(player);

            // 【调整：同步放宽间距】从1.4增加到1.8，确保大尺寸模型不重叠
            const lanes = [-1.8, 0, 1.8]; 
            let currentLane = 1;      
            let targetX = lanes[currentLane];

            // --- 4. 障碍物管理 ---
            const obstacles = [];
            const enemyTexture = textureLoader.load('enemy.png');
            
            // 【调整：障碍物尺寸也同步放大】
            const enemyGeo = new THREE.PlaneGeometry(1.6, 2.3); 
            enemyGeo.translate(0, 1.15, 0); 

            function spawnObstacle() {
                const mat = new THREE.MeshBasicMaterial({ map: enemyTexture, transparent: true });
                const obs = new THREE.Mesh(enemyGeo, mat);
                const laneIdx = Math.floor(Math.random() * 3);
                obs.position.set(lanes[laneIdx], 0, -30); // 稍微放远一点生成，给玩家反应时间
                scene.add(obs);
                obstacles.push(obs);
            }

            // --- 5. 交互控制 ---
            window.addEventListener('touchstart', (e) => {
                const x = e.touches[0].clientX;
                if (x < window.innerWidth / 2) {
                    if (currentLane > 0) currentLane--;
                } else {
                    if (currentLane < 2) currentLane++;
                }
                targetX = lanes[currentLane];
            });

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && currentLane > 0) currentLane--;
                if (e.key === 'ArrowRight' && currentLane < 2) currentLane++;
                targetX = lanes[currentLane];
            });

            // --- 6. 游戏主循环 ---
            let score = 0;
            let gameSpeed = 0.18; // 稍微提升基础初速，因为模型变大了
            let isGameOver = false;
            let frames = 0;

            const playerHitbox = new THREE.Box3();
            const enemyHitbox = new THREE.Box3();

            function animate() {
                if (isGameOver) return;
                requestAnimationFrame(animate);

                player.position.x += (targetX - player.position.x) * 0.15;
                groundTexture.offset.y -= gameSpeed * 0.2;

                if (frames % 55 === 0) spawnObstacle(); // 生成频率稍微加快

                // 更新玩家碰撞箱 (尺寸随模型放大而微调)
                playerHitbox.setFromCenterAndSize(
                    new THREE.Vector3(player.position.x, 1.1, player.position.z),
                    new THREE.Vector3(1.0, 2.0, 1.0) 
                );

                for (let i = 0; i < obstacles.length; i++) {
                    let obs = obstacles[i];
                    obs.position.z += gameSpeed; 

                    if (obs.position.z > -1) {
                        obs.material.opacity = Math.max(0, 1 - (obs.position.z + 1) / 5);
                    }

                    // 更新障碍物碰撞箱
                    enemyHitbox.setFromCenterAndSize(
                        new THREE.Vector3(obs.position.x, 1.15, obs.position.z),
                        new THREE.Vector3(1.0, 2.0, 1.0)
                    );

                    if (obs.material.opacity > 0.5 && playerHitbox.intersectsBox(enemyHitbox)) {
                        isGameOver = true;
                        audioBgm.pause(); 
                        audioEnd.play();  
                        document.getElementById('game-over').style.display = 'block';
                        document.getElementById('final-score').innerText = score;
                        break;
                    }

                    if (obs.position.z > 8) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        score += 10;
                        document.getElementById('score-display').innerText = "得分: " + score;
                        i--;
                    }
                }

                frames++;
                gameSpeed += 0.00006; 
                renderer.render(scene, camera);
            }

            animate();
        }
    </script>
</body>
</html>
