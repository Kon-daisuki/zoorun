<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恶搞同学跑酷 - 终极透视修复版</title>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-image: url('bg.jpg'); /* 森林背景 */
            background-size: cover; 
            background-position: center bottom;
            font-family: 'Arial', sans-serif; 
            touch-action: none; 
        }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .panel { pointer-events: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                 background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; text-align: center; 
                 box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 300px; }
        
        h1 { margin-top: 0; color: #27ae60; text-shadow: 1px 1px 0 #fff; font-size: 28px; }
        button { background: #27ae60; color: white; border: none; padding: 15px 30px; font-size: 20px; 
                 border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 5px 15px rgba(39,174,96,0.4); }
        button:active { transform: scale(0.95); }
        #score-display { position: absolute; top: 20px; left: 20px; font-size: 32px; font-weight: bold; color: white; text-shadow: 2px 2px 4px #000; display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="start-menu" class="panel">
            <h1>躲避变异同学</h1>
            <p style="color:#555; font-weight:bold; margin-bottom: 20px;">滑动屏幕：左右换道</p>
            <button onclick="startGame()">开始逃亡</button>
        </div>

        <div id="game-over" class="panel" style="display: none;">
            <h1 style="color: #c0392b;">你被撞飞了！</h1>
            <p style="font-size: 24px;">坚持了: <span id="final-score" style="color:#c0392b; font-weight:bold;">0</span> 分</p>
            <button onclick="location.reload()">再逃一次</button>
        </div>

        <div id="score-display">得分: 0</div>
    </div>

    <script>
        function startGame() {
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('score-display').style.display = 'block';
            init3DGame();
        }

        function init3DGame() {
            const scene = new THREE.Scene();

            // 【核心修复2】调整摄像机视角！现在摄像机会完美直视前方地平线消失点。
            // 这样冲过来的红衣服同学就会从极小的一点，完美呈现“近大远小”猛冲到你脸上！
            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 4, 8); 
            camera.lookAt(0, 4, -100); 

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const textureLoader = new THREE.TextureLoader();

            // 1. 加载玩家 (跑步的同学)
            const playerTexture = textureLoader.load('player.png');
            const playerMat = new THREE.MeshBasicMaterial({ map: playerTexture, transparent: true, side: THREE.DoubleSide });
            
            // 【核心修复1】去除了向上的强行偏移，并且把面板放得极大！
            // 因为你抠图带有大量多余空白，放大面板可以让位于中间的人恢复正常大小且踩在地上。
            const playerGeo = new THREE.PlaneGeometry(24, 30); 
            const player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, 4, 0); 
            scene.add(player);

            // 2. 加载障碍物 (穿红衣服的同学)
            const enemyTexture = textureLoader.load('enemy.png');
            const enemyMat = new THREE.MeshBasicMaterial({ map: enemyTexture, transparent: true, side: THREE.DoubleSide });
            const enemyGeo = new THREE.PlaneGeometry(4, 5); // 障碍物尺寸

            const lanes = [-3.5, 0, 3.5]; 
            let currentLane = 1;      
            let targetX = lanes[currentLane];
            
            let gameSpeed = 0.8;
            let score = 0;
            let frames = 0;
            let spawnInterval = 50; 
            let isGameOver = false;
            const obstacles =[];

            // 独立判定箱：由于图有很多空白，我们抛弃图片尺寸，手动在他们身体周围画隐形的物理碰撞盒
            const playerHitbox = new THREE.Box3();
            const enemyHitbox = new THREE.Box3();

            function moveLeft() { if (currentLane > 0) currentLane--; targetX = lanes[currentLane]; }
            function moveRight() { if (currentLane < 2) currentLane++; targetX = lanes[currentLane]; }

            window.addEventListener('keydown', (e) => {
                if (e.code === 'ArrowLeft') moveLeft();
                if (e.code === 'ArrowRight') moveRight();
            });

            let touchStartX = 0;
            window.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            });
            window.addEventListener('touchend', e => {
                let dx = e.changedTouches[0].screenX - touchStartX;
                if (Math.abs(dx) > 30) { 
                    if (dx > 0) moveRight();
                    else moveLeft();
                }
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            function animate() {
                if (isGameOver) return;
                requestAnimationFrame(animate);

                player.position.x += (targetX - player.position.x) * 0.2;

                if (frames >= spawnInterval) {
                    frames = 0;
                    const numObstacles = Math.random() > 0.5 ? 1 : 2;
                    const availableLanes =[0, 1, 2].sort(() => 0.5 - Math.random());
                    const blockedLanes = availableLanes.slice(0, numObstacles);

                    blockedLanes.forEach(laneIndex => {
                        const obs = new THREE.Mesh(enemyGeo, enemyMat);
                        // 从极远的 z=-130 的位置生成，完全贴合背景道路的尽头！
                        obs.position.set(lanes[laneIndex], 4, -130); 
                        scene.add(obs);
                        obstacles.push(obs);
                    });
                    
                    spawnInterval = 40 + Math.floor(Math.random() * 30); 
                }

                // 强制重写玩家的受击面积：只判定中心宽1.5、高4的真实肉体面积
                playerHitbox.setFromCenterAndSize(
                    new THREE.Vector3(player.position.x, player.position.y, player.position.z),
                    new THREE.Vector3(1.5, 4, 1.5) 
                );

                for (let i = 0; i < obstacles.length; i++) {
                    let obs = obstacles[i];
                    obs.position.z += gameSpeed; 

                    // 强制重写红衣同学的受击面积
                    enemyHitbox.setFromCenterAndSize(
                        new THREE.Vector3(obs.position.x, obs.position.y, obs.position.z),
                        new THREE.Vector3(2.5, 4.5, 2)
                    );

                    // 检测两人肉身是否相撞
                    if (playerHitbox.intersectsBox(enemyHitbox)) {
                        isGameOver = true;
                        document.getElementById('game-over').style.display = 'block';
                        document.getElementById('final-score').innerText = score;
                        break;
                    }

                    // 躲过之后加分
                    if (obs.position.z > 8) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        score += 10;
                        document.getElementById('score-display').innerText = "得分: " + score;
                        i--;
                    }
                }

                frames++;
                gameSpeed += 0.0002; 
                renderer.render(scene, camera);
            }

            animate();
        }
    </script>
</body>
</html>
