<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恶搞同学跑酷</title>
    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-image: url('bg.jpg'); 
            background-size: cover; 
            background-position: center bottom;
            font-family: 'Arial', sans-serif; 
            touch-action: none; 
        }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .panel { pointer-events: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                 background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 15px; text-align: center; 
                 box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 80%; max-width: 300px; }
        
        h1 { margin-top: 0; color: #27ae60; text-shadow: 1px 1px 0 #fff; font-size: 28px; }
        button { background: #27ae60; color: white; border: none; padding: 15px 30px; font-size: 20px; 
                 border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; box-shadow: 0 5px 15px rgba(39,174,96,0.4); }
        button:active { transform: scale(0.95); }
        #score-display { position: absolute; top: 20px; left: 20px; font-size: 32px; font-weight: bold; color: white; text-shadow: 2px 2px 4px #000; display: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="start-menu" class="panel">
            <h1>熊大快跑</h1>
            <p style="color:#555; font-weight:bold; margin-bottom: 20px;">滑动屏幕：左右换道</p>
            <button onclick="startGame()">开始逃亡</button>
        </div>

        <div id="game-over" class="panel" style="display: none;">
            <h1 style="color: #c0392b;">被创飞了！</h1>
            <p style="font-size: 24px;">得分: <span id="final-score" style="color:#c0392b; font-weight:bold;">0</span></p>
            <button onclick="location.reload()">重新开始</button>
        </div>

        <div id="score-display">得分: 0</div>
    </div>

    <script>
        const audioStart = new Audio('start.mp3');
        const audioBgm = new Audio('bgm.mp3');
        audioBgm.loop = true; 
        const audioEnd = new Audio('end.mp3');  

        function startGame() {
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('score-display').style.display = 'block';
            
            audioStart.play().catch(e => console.log("等待交互"));
            audioBgm.volume = 0.6; 
            audioBgm.play().catch(e => console.log("等待交互"));

            init3DGame();
        }

        function init3DGame() {
            const scene = new THREE.Scene();

            const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 6, 9); 
            camera.lookAt(0, 3, -100); 

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const textureLoader = new THREE.TextureLoader();

            // 玩家模型 (白衣服)
            const playerTexture = textureLoader.load('player.png');
            const playerMat = new THREE.MeshBasicMaterial({ map: playerTexture, transparent: true, side: THREE.DoubleSide });
            // 缩小玩家尺寸，防止遮挡视野
            const playerGeo = new THREE.PlaneGeometry(4, 6.5); 
            playerGeo.translate(0, 3.5, 0); 
            const player = new THREE.Mesh(playerGeo, playerMat);
            player.position.set(0, 0, 0); 
            scene.add(player);

            // 障碍物基础材质 (红衣服)
            const enemyTexture = textureLoader.load('enemy.png');
            const enemyMat = new THREE.MeshBasicMaterial({ map: enemyTexture, transparent: true, side: THREE.DoubleSide });
            
            // 【核心修复1：给障碍物瘦身！】
            // 宽度从原来的8大幅缩小到4.5，现在他们绝不会再“手拉手”重叠了！
            // 障碍物基础几何（尺寸1x1，通过scale实现近大远小）
            const enemyGeo = new THREE.PlaneGeometry(1, 1); 
            enemyGeo.translate(0, 0.5, 0); 

            // 跑道三条线：收窄到±1.8，保证玩家始终在背景跑道内
            const lanes = [-1.8, 0, 1.8]; 
            let currentLane = 1;      
            let targetX = lanes[currentLane];

            // 透视缩放函数：根据Z位置计算障碍物大小（近大远小）
            function getPerspectiveScale(z) {
                // z 从 -120(远) 到 0(近)，映射到 scale 0.5 -> 7
                const t = Math.max(0, Math.min(1, (z + 120) / 120));
                return 0.5 + t * 6.5;
            }
            // 透视X位置：远处汇聚，近处扩展
            function getPerspectiveLaneX(laneX, z) {
                const t = Math.max(0, Math.min(1, (z + 120) / 120));
                return laneX * (0.05 + t * 0.95);
            }
            
            let gameSpeed = 0.45; 
            let score = 0;
            let frames = 0;
            let spawnInterval = 70; 
            let isGameOver = false;
            const obstacles =[];

            const playerHitbox = new THREE.Box3();
            const enemyHitbox = new THREE.Box3();

            function moveLeft() { if (currentLane > 0) currentLane--; targetX = lanes[currentLane]; }
            function moveRight() { if (currentLane < 2) currentLane++; targetX = lanes[currentLane]; }

            window.addEventListener('keydown', (e) => {
                if (e.code === 'ArrowLeft') moveLeft();
                if (e.code === 'ArrowRight') moveRight();
            });

            let touchStartX = 0;
            window.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            });
            window.addEventListener('touchend', e => {
                let dx = e.changedTouches[0].screenX - touchStartX;
                if (Math.abs(dx) > 30) { 
                    if (dx > 0) moveRight();
                    else moveLeft();
                }
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            function animate() {
                if (isGameOver) return;
                requestAnimationFrame(animate);

                player.position.x += (targetX - player.position.x) * 0.2;
                // 限制玩家不超出跑道范围
                player.position.x = Math.max(-2.2, Math.min(2.2, player.position.x));

                if (frames >= spawnInterval) {
                    frames = 0;
                    const numObstacles = Math.random() > 0.5 ? 1 : 2;
                    const availableLanes =[0, 1, 2].sort(() => 0.5 - Math.random());
                    const blockedLanes = availableLanes.slice(0, numObstacles);

                    blockedLanes.forEach(laneIndex => {
                        const obsMatClone = enemyMat.clone();
                        const obs = new THREE.Mesh(enemyGeo, obsMatClone);
                        obs.userData.laneIndex = laneIndex; // 记录所在车道
                        const initZ = -120;
                        const initScale = getPerspectiveScale(initZ);
                        obs.position.set(getPerspectiveLaneX(lanes[laneIndex], initZ), 0, initZ);
                        obs.scale.set(initScale, initScale, 1);
                        scene.add(obs);
                        obstacles.push(obs);
                    });
                    
                    spawnInterval = 60 + Math.floor(Math.random() * 40); 
                }

                // 精准的碰撞箱（变小一点，容错率更高，绝不擦边死）
                playerHitbox.setFromCenterAndSize(
                    new THREE.Vector3(player.position.x, 3, player.position.z),
                    new THREE.Vector3(1.5, 5, 1.5)
                );

                for (let i = 0; i < obstacles.length; i++) {
                    let obs = obstacles[i];
                    obs.position.z += gameSpeed;

                    // 近大远小：每帧根据Z更新scale和X坐标
                    const sc = getPerspectiveScale(obs.position.z);
                    obs.scale.set(sc, sc, 1);
                    obs.position.x = getPerspectiveLaneX(lanes[obs.userData.laneIndex], obs.position.z);

                    // 靠近玩家时淡出（防遮挡）
                    if (obs.position.z > -2) {
                        obs.material.opacity = Math.max(0, 1 - (obs.position.z + 2) / 5);
                    } else {
                        obs.material.opacity = 1;
                    }

                    // 碰撞箱随scale动态调整
                    const hitW = sc * 0.5;
                    const hitH = sc * 0.8;
                    enemyHitbox.setFromCenterAndSize(
                        new THREE.Vector3(obs.position.x, hitH * 0.5, obs.position.z),
                        new THREE.Vector3(hitW, hitH, 1.0)
                    );

                    // 只有在障碍物没有完全透明（即还没有完全错过）时才进行死亡判定
                    if (obs.material.opacity > 0.5 && playerHitbox.intersectsBox(enemyHitbox)) {
                        isGameOver = true;
                        audioBgm.pause(); 
                        audioEnd.play();  
                        document.getElementById('game-over').style.display = 'block';
                        document.getElementById('final-score').innerText = score;
                        break;
                    }

                    // 完全跑到脑后（摄像机后面）时销毁并加分
                    if (obs.position.z > 8) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        score += 10;
                        document.getElementById('score-display').innerText = "得分: " + score;
                        i--;
                    }
                }

                frames++;
                gameSpeed += 0.00008; 
                renderer.render(scene, camera);
            }

            animate();
        }
    </script>
</body>
</html>
